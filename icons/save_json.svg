<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- outer diskette body -->
  <rect x="4" y="4" width="24" height="24" rx="2"
        fill="none" stroke="#cdd6f4" stroke-width="2"/>
  <!-- label area (bottom) -->
  <rect x="7" y="18" width="18" height="7" rx="1"
        fill="none" stroke="#cdd6f4" stroke-width="1.5"/>
  <!-- shutter slot (top, slightly inset) -->
  <rect x="9" y="4" width="12" height="9"
        fill="none" stroke="#cdd6f4" stroke-width="1.5"/>
  <!-- write-protect notch on shutter -->
  <rect x="17" y="5.5" width="3" height="6" rx="0.5"
        fill="#cdd6f4"/>
</svg>
