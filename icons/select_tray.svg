<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Tray outline -->
  <rect x="4" y="8" width="24" height="18" rx="2" ry="2"
        fill="none" stroke="#cdd6f4" stroke-width="1.8"/>
  <!-- Inner compartment hint -->
  <rect x="8" y="12" width="16" height="10" rx="1" ry="1"
        fill="none" stroke="#cdd6f4" stroke-width="1.0" stroke-dasharray="2,2"/>
  <!-- Arrow pointing up-left toward tray -->
  <polyline points="16,4 20,4 20,8"
        fill="none" stroke="#a6e3a1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="20" y1="4" x2="14" y2="10"
        stroke="#a6e3a1" stroke-width="1.8" stroke-linecap="round"/>
</svg>
