<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tray body -->
  <rect x="2" y="2" width="60" height="60" rx="5" ry="5"
        fill="#3a6bc4" stroke="#1e4a9e" stroke-width="2"/>

  <!-- Top-left compartment -->
  <rect x="7"  y="7"  width="26" height="24" rx="2" fill="#cfe0ff"/>
  <!-- Top-right compartment -->
  <rect x="37" y="7"  width="20" height="24" rx="2" fill="#cfe0ff"/>

  <!-- Bottom-left compartment -->
  <rect x="7"  y="35" width="12" height="22" rx="2" fill="#cfe0ff"/>
  <!-- Bottom-middle compartment -->
  <rect x="23" y="35" width="14" height="22" rx="2" fill="#cfe0ff"/>
  <!-- Bottom-right compartment -->
  <rect x="41" y="35" width="16" height="22" rx="2" fill="#cfe0ff"/>

  <!-- Finger hole in top-left compartment -->
  <circle cx="20" cy="19" r="5" fill="#3a6bc4"/>
  <circle cx="20" cy="19" r="3" fill="#8ab4f8"/>
</svg>
